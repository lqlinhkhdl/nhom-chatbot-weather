<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌦️ Chatbot Du lịch & Thời tiết</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --user-msg-bg: #667eea;
            --bot-msg-bg: #f1f3f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 750px;
            overflow: hidden;
        }

        /* --- AUTH SCREENS --- */
        .auth-screen { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .hidden { display: none !important; }
        .auth-form { width: 100%; max-width: 350px; }
        .auth-form h2 { text-align: center; color: #667eea; margin-bottom: 25px; font-size: 28px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: #444; font-weight: 500; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #eee; border-radius: 10px; transition: 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; background: #fcfcff; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary-gradient); color: white; margin-top: 10px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }

        .error-message { background: #fff5f5; color: #e53e3e; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; text-align: center; border: 1px solid #fed7d7; }

        /* --- CHAT SCREEN --- */
        .chat-screen { display: flex; flex-direction: column; height: 100%; }
        .header { background: var(--primary-gradient); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; }
        .header-btn { background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        
        .user-info { padding: 8px 20px; background: #f8f9fa; border-bottom: 1px solid #eee; font-size: 12px; color: #666; font-weight: 500; }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; background: #ffffff; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .message { display: flex; flex-direction: column; max-width: 85%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { align-self: flex-end; }
        .message.bot { align-self: flex-start; }

        .message-content { padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.6; position: relative; }
        .user .message-content { background: var(--user-msg-bg); color: white; border-bottom-right-radius: 2px; }
        .bot .message-content { background: var(--bot-msg-bg); color: #2d3748; border-bottom-left-radius: 2px; }

        /* Style cho nội dung bot (Markdown-ish) */
        .bot .message-content ul { margin-left: 20px; margin-top: 5px; }
        .bot .message-content strong { color: #000; }

        .timestamp { font-size: 10px; color: #a0aec0; margin-top: 4px; padding: 0 5px; }
        .user .timestamp { align-self: flex-end; }

        .empty-state { text-align: center; color: #a0aec0; margin-top: 50px; }
        .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }

        .input-area { padding: 15px 20px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        .input-area input { flex: 1; padding: 12px 18px; border: 1px solid #e2e8f0; border-radius: 25px; outline: none; transition: 0.3s; }
        .input-area input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .input-area button { background: var(--primary-gradient); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .input-area button:hover { transform: scale(1.05); }

        /* --- SIDEBAR --- */
        .history-sidebar { position: fixed; left: 0; top: 0; width: 280px; height: 100vh; background: white; z-index: 1000; transform: translateX(-100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-shadow: 5px 0 25px rgba(0,0,0,0.1); }
        .history-sidebar.show { transform: translateX(0); }
        .history-header { padding: 20px; background: var(--primary-gradient); color: white; display: flex; justify-content: space-between; align-items: center; }
        .history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { padding: 12px; margin-bottom: 8px; background: #f7fafc; border-radius: 10px; cursor: pointer; font-size: 13px; border-left: 4px solid transparent; }
        .history-item:hover { background: #edf2f7; border-left-color: #667eea; }

        .loading { display: flex; gap: 4px; padding: 10px; }
        .loading span { width: 6px; height: 6px; background: #cbd5e0; border-radius: 50%; animation: blink 1.4s infinite; }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        @media (max-width: 600px) { .container { height: 100vh; max-height: 100vh; border-radius: 0; } .history-sidebar { width: 85%; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen" class="auth-screen">
            <div class="auth-form">
                <h2>🌦️OMG Xin chào!</h2>
                <div id="loginError" class="error-message hidden"></div>
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="loginUsername" placeholder="Ví dụ: user123" onkeypress="if(event.key==='Enter') handleLogin()">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" onkeypress="if(event.key==='Enter') handleLogin()">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">Đăng Nhập</button>
                <div style="text-align: center; margin-top: 20px; font-size: 14px; color: #666;">
                    Chưa có tài khoản? <a onclick="switchToRegister()" style="color: #667eea; cursor: pointer; font-weight: 600;">Đăng ký ngay</a>
                </div>
            </div>
        </div>

        <div id="registerScreen" class="auth-screen hidden">
            <div class="auth-form">
                <h2>📝 Đăng ký</h2>
                <div id="registerError" class="error-message hidden"></div>
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="regUsername" placeholder="Chọn tên dễ nhớ" onkeypress="if(event.key==='Enter') handleRegister()">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="regPassword" placeholder="Tối thiểu 6 ký tự" onkeypress="if(event.key==='Enter') handleRegister()">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">Tạo tài khoản</button>
                <div style="text-align: center; margin-top: 20px; font-size: 14px; color: #666;">
                    Đã có tài khoản? <a onclick="switchToLogin()" style="color: #667eea; cursor: pointer; font-weight: 600;">Đăng nhập</a>
                </div>
            </div>
        </div>

        <div id="chatScreen" class="chat-screen hidden">
            <div class="header">
                <h1>🌦️ OMG Weather </h1>
                <div style="display: flex; gap: 8px;">
                    <button class="header-btn" onclick="startNewChat()" style="background: rgba(56, 189, 248, 0.4);">➕ Chat mới</button>
                    <button class="header-btn" onclick="loadHistory()">📖 Lịch sử</button>
                    <button class="header-btn" onclick="handleLogout()" style="background: rgba(255,0,0,0.2);">Thoát</button>
                </div>
            </div>
            <div class="user-info">
                📍 Đang đăng nhập: <span id="currentUser" style="color: #667eea;"></span>
            </div>
            <div class="chat-area" id="chatArea">
                <div class="empty-state">
                    <div class="emoji">👋</div>
                    <p>Chào <strong id="welcomeName">bạn</strong>!</p>
                    <p style="font-size: 13px; margin-top: 5px;">Hỏi mình về thời tiết hoặc địa điểm du lịch nhé.</p>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Hà Nội hôm nay thế nào?..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">➤</button>
            </div>
        </div>

        <div id="historySidebar" class="history-sidebar">
            <div class="history-header">
                <span>💬 Nhật ký chat</span>
                <button onclick="closeHistory()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">✕</button>
            </div>
            <div class="history-list" id="historyList"></div>
            <div style="padding: 15px; border-top: 1px solid #eee;">
                <button class="btn" style="background: #feb2b2; color: #9b2c2c; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px;" onclick="confirmClearHistory()">
                    🗑️ Xóa sạch lịch sử
                </button>
            </div>
        </div>
    </div>
    <script>
        let currentUserId = null;
        let currentUsername = null;

        // --- HÀM TIỆN ÍCH ---
        function formatMessage(text) {
            // Parser đơn giản cho Markdown: bôi đậm và danh sách
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/^\* (.*$)/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/\n/g, '<br>');
        }

        function showError(screen, msg) {
            const el = document.getElementById(screen + 'Error');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        // --- ĐIỀU HƯỚNG ---
        function switchToRegister() { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('registerScreen').classList.remove('hidden'); }
        function switchToLogin() { document.getElementById('registerScreen').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden'); }
        function showChatScreen() {
            document.querySelectorAll('.auth-screen').forEach(s => s.classList.add('hidden'));
            // Hiện màn hình chat
            document.getElementById('chatScreen').classList.remove('hidden');
            // 1. Cập nhật tên ở dòng "Đang đăng nhập"
            document.getElementById('currentUser').textContent = currentUsername;
            document.querySelectorAll('.auth-screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('currentUser').textContent = currentUsername;
            // 2. Cập nhật tên ở lời chào Empty State (Phần bạn vừa yêu cầu)
            const welcomeNameEl = document.getElementById('welcomeName');
            if (welcomeNameEl) {
                welcomeNameEl.textContent = currentUsername;}
        }

        // --- LOGIC AUTH ---
        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            if(!username || !email || !password) return showError('register', 'Điền đủ thông tin bạn ơi!');

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if(data.success) { currentUserId = data.user_id; currentUsername = username; showChatScreen(); }
                else showError('register', data.message);
            } catch(e) { showError('register', 'Lỗi kết nối Server rồi!'); }
        }

        async function handleLogin() {
            const u = document.getElementById('loginUsername').value;
            const p = document.getElementById('loginPassword').value;
            if(!u || !p) return showError('login', 'Nhập đủ tên và mật khẩu nhé!');

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if(data.success) { currentUserId = data.user_id; currentUsername = u; showChatScreen(); }
                else showError('login', data.message);
            } catch(e) { showError('login', 'Lỗi kết nối rùi!'); }
        }

        function handleLogout() { location.reload(); }

        // --- LOGIC CHAT ---
        let isViewingHistory = false;  // Track if viewing old conversation
        let currentHistoryId = null;   // Track which history item we're viewing
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if(!msg || !currentUserId) return;

            // If viewing history, go back to current chat first
            if(isViewingHistory) {
                backToCurrentChat();
                return;
            }

            // Xóa lời chào nếu là tin nhắn đầu
            const empty = document.querySelector('.empty-state');
            if(empty) empty.remove();

            addMessage(msg, 'user');
            input.value = '';

            const loader = document.createElement('div');
            loader.className = 'message bot';
            loader.innerHTML = `<div class="message-content"><div class="loading"><span></span><span></span><span></span></div></div>`;
            document.getElementById('chatArea').appendChild(loader);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUserId, message: msg })
                });
                const data = await res.json();
                loader.remove();
                addMessage(data.response, 'bot');
            } catch(e) {
                loader.remove();
                addMessage('Lỗi kết nối, thử lại nhé!', 'bot');
            }
        }

        function addMessage(text, sender) {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'});
            
            div.innerHTML = `
                <div class="message-content">${sender === 'bot' ? formatMessage(text) : text}</div>
                <div class="timestamp">${time}</div>
            `;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        // --- HISTORY VIEWING ---
        async function loadHistory() {
            try {
                const res = await fetch(`/sessions/${currentUserId}?limit=20`);
                const data = await res.json();
                const list = document.getElementById('historyList');
                list.innerHTML = '';
                
                if(!data.success || data.session_count === 0) {
                    list.innerHTML = '<p style="text-align:center;color:#999;margin-top:20px;">📭 Trống không...</p>';
                    document.getElementById('historySidebar').classList.add('show');
                    return;
                }
                
                // Add "Back to current chat" button if viewing history
                if(isViewingHistory) {
                    const backBtn = document.createElement('div');
                    backBtn.innerHTML = `
                        <button onclick="backToCurrentChat()" style="
                            width: 95%;
                            margin: 10px auto;
                            padding: 10px;
                            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                            color: white;
                            border: none;
                            border-radius: 8px;
                            cursor: pointer;
                            font-weight: 600;
                            display: block;
                        ">↩️ Quay lại chat hiện tại</button>
                    `;
                    list.appendChild(backBtn);
                }
                
                data.sessions.forEach(session => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.style.cursor = 'pointer';
                    const startTime = new Date(session.start_time).toLocaleString('vi-VN', {
                        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                    
                    item.innerHTML = `
                        <strong>💬 ${session.first_message}</strong>
                        <br>
                        <small>📅 ${startTime}</small>
                        <br>
                        <small style="color:#999;">📊 ${session.message_count} tin nhắn</small>
                    `;
                    
                    item.onclick = () => autoRestoreAndChat(session.latest_history_id);
                    list.appendChild(item);
                });
                
                document.getElementById('historySidebar').classList.add('show');
            } catch(e) { 
                console.error('Error loading history:', e);
                alert('Không tải được lịch sử!'); 
            }
        }
        async function restoreAndChat(historyId) {
            try {
                const res = await fetch(`/session/restore/${currentUserId}/${historyId}`, { method: 'POST' });
                const data = await res.json();
                
                if(data.success) {
                    // 1. Thoát chế độ xem lịch sử
                    isViewingHistory = false;
                    currentHistoryId = null;
                    
                    // 2. Mở khóa ô nhập liệu
                    const input = document.getElementById('messageInput');
                    input.disabled = false;
                    input.placeholder = "Hỏi tiếp về chủ đề này...";
                    input.focus();
                    
                    // 3. Xóa cái Banner "Đang xem lịch sử" đi là xong
                    document.querySelector('.history-banner').remove();
                    
                    alert("✨ Đã sẵn sàng! Bạn có thể chat tiếp rồi nhé.");
                } else {
                    alert("Không thể khôi phục: " + data.message);
                }
            } catch(e) {
                alert("Lỗi kết nối khôi phục phiên chat.");
            }
        }
        async function confirmClearHistory() {
            // 1. Hỏi xác nhận để tránh bấm nhầm
            if (!confirm("Bạn có chắc chắn muốn xóa VĨNH VIỄN toàn bộ lịch sử chat không? Hành động này không thể hoàn tác.")) return;

            try {
                // 2. Gọi API xóa trong Database (Dựa trên route @app.delete("/history/{user_id}") trong main.py)
                const resDb = await fetch(`/history/${currentUserId}`, { method: 'DELETE' });
                const dataDb = await resDb.json();

                if (dataDb.success) {
                    // 3. Gọi API xóa Session trong RAM (Dựa trên route @app.delete("/session/{user_id}") trong main.py)
                    await fetch(`/session/${currentUserId}`, { method: 'DELETE' });

                    alert("✨ Đã xóa sạch sành sanh lịch sử!");
                    
                    // 4. Cập nhật giao diện ngay lập tức
                    document.getElementById('historyList').innerHTML = '<p style="text-align:center;color:#999;margin-top:20px;">📭 Trống không...</p>';
                    backToCurrentChat(); // Quay về màn hình chat trống
                } else {
                    alert("Lỗi: " + dataDb.message);
                }
            } catch (e) {
                console.error("Lỗi khi xóa:", e);
                alert("Không thể kết nối đến máy chủ để xóa lịch sử.");
            }
        }
        // 1. XEM LỊCH SỬ (Chế độ chỉ đọc)
        async function viewConversation(historyId, preview) {
            try {
                const res = await fetch(`/conversation/${currentUserId}/${historyId}`);
                const data = await res.json();
                if(!data.success) return;

                isViewingHistory = true;
                currentHistoryId = historyId;
                document.getElementById('historySidebar').classList.remove('show');

                const chatArea = document.getElementById('chatArea');
                chatArea.innerHTML = `
                    <div style="background:#fef3c7; padding:15px; border-radius:12px; text-align:center; margin-bottom:15px; border:1px solid #fde68a;">
                        <p style="color:#92400e; font-weight:600; font-size:13px; margin-bottom:8px;">⌛ Đang xem lại lịch sử</p>
                        <div style="display:flex; gap:10px; justify-content:center;">
                            <button class="header-btn" onclick="restoreAndChat(${historyId})" style="background:#0284c7;">🚀 Chat tiếp bản này</button>
                            <button class="header-btn" onclick="backToCurrentChat()" style="background:#64748b;">↩️ Quay lại</button>
                        </div>
                    </div>
                `;

                data.conversation.forEach(msg => {
                    addMessage(msg.user_message, 'user');
                    addMessage(msg.bot_response, 'bot');
                });

                // Khóa ô nhập
                const input = document.getElementById('messageInput');
                input.disabled = true;
                input.placeholder = 'Đang ở chế độ xem lại...';
                document.querySelector('.input-area button').style.opacity = '0.5';
            } catch(e) { alert("Lỗi tải lịch sử"); }
        }

        // 2. QUAY LẠI CHAT ĐANG DỞ (Khôi phục từ RAM)
        async function backToCurrentChat() {
            isViewingHistory = false;
            currentHistoryId = null;
            
            // Mở khóa ô nhập
            const input = document.getElementById('messageInput');
            input.disabled = false;
            input.placeholder = 'Nhắn tin tiếp...';
            document.querySelector('.input-area button').style.opacity = '1';

            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '<div style="text-align:center; padding:20px; color:#94a3b8;">🔄 Đang khôi phục...</div>';

            try {
                const res = await fetch(`/session/${currentUserId}/history`);
                const data = await res.json();
                chatArea.innerHTML = '';
                if(data.success && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        addMessage(msg.content, msg.role === 'assistant' ? 'bot' : 'user');
                    });
                } else {
                    location.reload(); // Nếu không có gì thì reset trang cho sạch
                }
            } catch(e) { location.reload(); }
        }

        // 3. KHÔI PHỤC LỊCH SỬ ĐỂ CHAT TIẾP
        async function restoreAndChat(historyId) {
            try {
                const res = await fetch(`/session/restore/${currentUserId}/${historyId}`, { method: 'POST' });
                const data = await res.json();
                if(data.success) {
                    alert("✨ Đã khôi phục! Giờ bạn có thể nhắn tin tiếp vào đoạn hội thoại này.");
                    await backToCurrentChat(); // Gọi hàm này để vẽ lại màn hình và mở khóa ô chat
                } else {
                    alert("Không thể khôi phục: " + data.message);
                }
            } catch(e) { alert("Lỗi kết nối khôi phục."); }
        }
        async function autoRestoreAndChat(historyId) {
            try {
                // 1. Hiện thông báo đang xử lý để người dùng biết
                const chatArea = document.getElementById('chatArea');
                chatArea.innerHTML = '<div style="text-align:center; padding:20px; color:#0284c7;">🔄 Đang khôi phục cuộc trò chuyện...</div>';
                
                // Đóng sidebar cho gọn màn hình
                document.getElementById('historySidebar').classList.remove('show');

                // 2. Gọi API khôi phục session ở Backend (Cập nhật RAM của Bot)
                const res = await fetch(`/session/restore/${currentUserId}/${historyId}`, { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    // 3. Sau khi khôi phục xong, dùng hàm backToCurrentChat 
                    // để lôi tin nhắn ra hiển thị và MỞ KHÓA ô nhập liệu tự động
                    await backToCurrentChat();
                    
                    // Đưa con trỏ chuột vào ô nhập liệu để người dùng gõ được luôn
                    document.getElementById('messageInput').focus();
                } else {
                    alert("Không thể khôi phục: " + data.message);
                    // Nếu lỗi thì quay về trạng thái ban đầu
                    backToCurrentChat();
                }
            } catch (e) {
                console.error("Lỗi tự động khôi phục:", e);
                alert("Lỗi kết nối khi khôi phục lịch sử.");
            }
        }
        async function startNewChat() {
            try {
                // 1. Gọi API xóa bộ nhớ ngắn hạn (Session RAM) ở Backend
                // Điều này giúp bot quên đi bối cảnh cũ và bắt đầu một chủ đề mới tinh
                await fetch(`/session/${currentUserId}`, { method: 'DELETE' });

                // 2. Reset lại các biến trạng thái
                isViewingHistory = false;
                currentHistoryId = null;

                // 3. Dọn dẹp khung chat và hiển thị lại lời chào
                const chatArea = document.getElementById('chatArea');
                chatArea.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">👋</div>
                        <p>Chào <strong id="welcomeName">${currentUsername}</strong>!</p>
                        <p style="font-size: 13px; margin-top: 5px;">Hỏi mình về thời tiết hoặc địa điểm du lịch nhé.</p>
                    </div>
                `;

                // 4. Mở khóa ô nhập liệu và làm mới nó
                const input = document.getElementById('messageInput');
                input.value = '';
                input.disabled = false;
                input.placeholder = 'Hà Nội hôm nay thế nào?...';
                input.focus(); // Tự động đưa con trỏ chuột vào ô chat

                const sendBtn = document.querySelector('.input-area button');
                sendBtn.style.opacity = '1';

                // Đóng sidebar lịch sử nếu nó đang mở
                document.getElementById('historySidebar').classList.remove('show');

            } catch (e) {
                console.error('Lỗi khi tạo chat mới:', e);
                alert("Lỗi kết nối: Không thể khởi tạo phiên chat mới.");
            }
        }
        function closeHistory() { document.getElementById('historySidebar').classList.remove('show'); }
    </script>
</body>
</html>
